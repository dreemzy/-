
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <style>
       
        body {
            margin: 0;
            padding: 40px;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        
        .event-card {
            background-color: #004d4d; 
            color: white;
            padding: 60px;
            max-width: 900px;
            margin: 0 auto;
            box-sizing: border-box;
        }

       
        .breadcrumbs {
            font-size: 16px;
            color: #a0c0c0;
            margin-bottom: 20px;
        }


        .event-title {
            font-size: 48px;
            margin: 0 0 40px 0;
            line-height: 1.1;
            font-weight: bold;
        }

        
        .meta-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        
        .author-avatar {
            width: 70px;
            height: 70px;
            background-color: #fff;
            border-radius: 50%;
            border: 4px solid #f1c40f; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            flex-shrink: 0;
        }

        
        .meta-info {
            display: flex;
            gap: 40px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 12px;
            color: #a0c0c0;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 14px;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .event-card {
                padding: 30px; 
            }

            .event-title {
                font-size: 28px; 
                margin-bottom: 30px;
            }

            .breadcrumbs {
                font-size: 14px;
            }

            .meta-container {
                gap: 20px;
                align-items: flex-start;
            }

            .author-avatar {
                width: 60px;
                height: 60px;
            }

            
            .meta-info {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            .meta-label {
                font-size: 11px;
            }

            .meta-value {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="event-card">
        <nav class="breadcrumbs">Home / Articles /</nav>
        
        <h1 class="event-title">The Difference Between Responsive and Adaptive Design</h1>

        <div class="meta-container">
            <div class="author-avatar">👤</div>

            <div class="meta-info">
                <div class="meta-item">
                    <span class="meta-label">Author</span>
                    <span class="meta-value">Geoff Graham</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">49 Comments</span>
                    <span class="meta-value">Go to comments</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Published</span>
                    <span class="meta-value">Nov 11, 2018</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Updated</span>
                    <span class="meta-value">Nov 17, 2018</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
