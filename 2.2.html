<head>
    <meta charset="UTF-8">
    <title>My To Do List</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; }
        .todo-container { width: 400px; margin: 50px auto; background: white; padding: 20px; }
        ul { list-style: none; padding: 0; }
        li {
            background-color: #add8e6;
            margin-bottom: 2px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        li.checked span { text-decoration: line-through; }
        .close { color: red; cursor: pointer; font-weight: bold; }
        input[type="checkbox"] { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="todo-container">
        <h2>My To Do List</h2>
        <ul>
            <li><div><input type="checkbox"> <span>Hit the gym</span></div> <span class="close">×</span></li>
            <li class="checked"><div><input type="checkbox" checked> <span>Pay bills</span></div> <span class="close">×</span></li>
            <li><div><input type="checkbox"> <span>Meet John</span></div> <span class="close">×</span></li>
            <li><div><input type="checkbox"> <span>Buy eggs</span></div> <span class="close">×</span></li>
            <li class="checked"><div><input type="checkbox" checked> <span>Read a book</span></div> <span class="close">×</span></li>
        </ul>
    </div>
</body>
