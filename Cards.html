<head>
    <meta charset="UTF-8">
    <title>Card game</title>
    <style>
        .card {
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            margin: 5px;
            font-size: 24px;
            background-color: #f9f9f9;
            min-width: 40px;
            text-align: center;
        }
        .red { color: red; }
    </style>
</head>
<body>
    <p>Player 1:</p>
    <div class="card">2&spades;</div>
    <div class="card red">9&hearts;</div>
    <div class="card red">6&hearts;</div>
    <div class="card red">A&diams;</div>
    <div class="card">Q&spades;</div>
    <div class="card">J&clubs;</div>

    <p>Player 2:</p>
    <div class="card red">3&hearts;</div>
    <div class="card">A&clubs;</div>
    <div class="card">10&clubs;</div>
    <div class="card red">K&diams;</div>
    <div class="card">8&spades;</div>
    <div class="card red">3&hearts;</div>
</body>
</html>
