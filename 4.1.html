<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        
        .upload-container {
            background-color: #fff;
            border: 1px solid #d1d1d1;
            padding: 15px;
            display: flex;
            flex-direction: row; 
            gap: 20px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        
        .video-preview {
            background-color: #cccccc;
            min-width: 240px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #b0b0b0;
        }

        .preview-icon {
            font-size: 60px;
            color: #555;
            user-select: none;
        }

       
        .video-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .progress-wrapper {
            display: flex;
            border: 1px solid #4a69bd;
            font-size: 13px;
            margin-bottom: 12px;
            background-color: #fff;
        }

        .progress-fill {
            background-color: #ced6e0;
            padding: 6px 10px;
            width: 40%;
            border-right: 1px solid #4a69bd;
            color: #2f3542;
            white-space: nowrap;
        }

        .time-left {
            padding: 6px 10px;
            flex-grow: 1;
            text-align: right;
            color: #57606f;
        }

        .video-title {
            margin: 0 0 8px 0;
            font-size: 20px;
            color: #2f3542;
        }

        .helper-text {
            font-size: 12px;
            color: #747d8c;
            margin: 0;
        }

        
        .video-action {
            display: flex;
            align-items: flex-start;
        }

        .btn-done {
            background-color: #4a69bd;
            color: white;
            border: none;
            padding: 10px 30px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 100px;
        }

        .btn-done:hover {
            background-color: #3c55a5;
        }

        
        @media (max-width: 700px) {
            .upload-container {
                flex-direction: column; 
                max-width: 400px;
                align-items: stretch;
            }

            .video-preview {
                width: 100%;
                height: 200px;
            }

            .video-action {
                order: 3; 
            }

            .btn-done {
                width: 100%; 
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <div class="video-preview">
            <div class="preview-icon">🔄</div>
        </div>

        <div class="video-info">
            <div class="progress-wrapper">
                <div class="progress-fill">Загрузка 40%</div>
                <div class="time-left">Осталось примерно 22 минуты.</div>
            </div>
            <h2 class="video-title">ВлГУ День открытых дверей 2025</h2>
            <p class="helper-text">* Ваше видео загружается. Пожалуйста, не закрывайте эту страницу до завершения загрузки.</p>
        </div>

        <div class="video-action">
            <button class="btn-done">ГОТОВО</button>
        </div>
    </div>

</body>
